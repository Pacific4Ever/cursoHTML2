<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Empresa de reformas del hogar">
    <meta name="keywords" content="Reformas, hogar, decoración">
    <meta name="author" content="Mr. Strong and Handy">
    <meta name="copyright" content="S.A. Reformas Handyman">
    <title>Servicios ~ Reformas Handyman</title>
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f5f7fa;
            color: #070707;
            line-height: 1.6;
        }

        header {
            background: #384d7a;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
        }

        .logo {
            color: white;
            font-size: 32px;
            font-weight: bold;
        }

        nav a {
            color: #d1d5db;
            text-decoration: none;
            margin-left: 25px;
            font-size: 17px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #f59e0b;
        }

        .hero {
            background: linear-gradient(rgba(17, 24, 39, 0.85),
                rgba(17, 24, 39, 0.85)),
                url("IMG/background_page.webp");
            background-size: cover;
            background-position: center;
            height: 90vh;

            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .hero-content h1 {
            font-size: 70px;
            color: white;
            margin-bottom: 20px;
        }

        .hero-content p {
            color: #d1d5db;
            font-size: 24px;
            max-width: 700px;
            margin: auto;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            background: #f59e0b;
            color: white;
            padding: 16px 35px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #d97706;
            transform: translateY(-2px);
        }

        section {
            padding: 90px 8%;
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title h2 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .section-title p {
            color: #666;
            font-size: 18px;
        }

        .services {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 14px;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card .icon {
            font-size: 55px;
            margin-bottom: 20px;
        }

        .card h3 {
            margin-bottom: 15px;
            font-size: 25px;
        }

        .card p {
            color: #666;
        }

        .about {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 50px;
            align-items: center;
            background: white;
        }

        .about img {
            width: 100%;
            border-radius: 14px;
        }

        .about-text h2 {
            font-size: 45px;
            margin-bottom: 25px;
        }

        .about-text p {
            color: #555;
            margin-bottom: 30px;
            font-size: 18px;
        }

        .contact {
            text-align: center;
        }

        .contact h2 {
            font-size: 42px;
            margin-bottom: 20px;
        }

        .contact p {
            color: #666;
            margin-bottom: 35px;
            font-size: 18px;
        }

        footer {
            background: #111827;
            color: white;
            text-align: center;
            padding: 35px;
        }

        footer p {
            color: #9ca3af;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <header>
        <h1 class="logo">Servicios</h1>
<br>
        <nav>
            <a href="web_reformas_main.html">Inicio</a>
            <a href="pagina_sobre_nosotros.html">Sobre nosotros</a>
            <a href="pagina_servicios.html">Servicios</a>
            <a href="pagina_proyectos.html">Proyectos</a>
            <a href="pagina_contacto.html">Contacto</a>
        </nav>
    </header>

    <main>
        <section>
            <article>
                
            </article>
        </section>
    </main>
    <footer>
        <h3>Reformas Handyman</h3>
        <p>© 2026 Todos los derechos reservados</p>
    </footer>
</body>
</html>
